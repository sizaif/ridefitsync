name: ridefitsync
description: Auto sync FIT files from OneLap OTM to Strava, iGPSPORT, Xingzhe, and Giant RideLife - by 小悟空
publish_to: 'none'
version: 1.1.5+115

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0
  fit_tool: ^1.0.5
  archive: ^3.6.0
  crypto: ^3.0.3
  uuid: ^4.0.0
  xml: ^6.3.0
  shared_preferences: ^2.2.0
  path: ^1.8.0
  path_provider: ^2.1.0
  provider: ^6.1.0
  intl: ^0.19.0
  url_launcher: ^6.2.0
  pointycastle: ^3.7.3
  flutter_animate: ^4.5.2
  flutter_local_notifications: ^18.0.0
  file_picker: ^8.0.0
  share_handler: ^0.0.10
  app_links: ^6.0.0
  flutter_inappwebview: ^6.0.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/donate/
    - assets/icon/
